# Configuration for webpage dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset webpage --method dpg
#   python scripts/run_experiment.py --dataset webpage --method dice

data:
  dataset: webpage
  dataset_url: https://huggingface.co/datasets/MLLab-TS/webpage/resolve/main/dataset.csv
  target_column: target
experiment:
  tags:
  - webpage
  name: webpage
model:
  n_estimators: 15
  min_samples_split: 4
  min_impurity_decrease: 0.0
  max_features: 0.3
  max_depth: 10
  criterion: gini
