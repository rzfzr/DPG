# Configuration for yeast_me2 dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset yeast_me2 --method dpg
#   python scripts/run_experiment.py --dataset yeast_me2 --method dice

data:
  dataset: yeast_me2
  dataset_url: https://huggingface.co/datasets/MLLab-TS/yeast_me2/resolve/main/dataset.csv
  target_column: target
experiment:
  tags:
  - yeast_me2
  name: yeast_me2
model:
  n_estimators: 4
  min_impurity_decrease: 0.0
  max_features: 0.5
  max_depth: 3
