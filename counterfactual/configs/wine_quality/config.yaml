# Configuration for wine_quality dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset wine_quality --method dpg
#   python scripts/run_experiment.py --dataset wine_quality --method dice

data:
  dataset: wine_quality
  dataset_url: https://huggingface.co/datasets/MLLab-TS/wine_quality/resolve/main/dataset.csv
  target_column: target
experiment:
  tags:
  - wine_quality
  name: wine_quality
model:
  n_estimators: 20
  min_samples_split: 4
  min_impurity_decrease: 0.0
  max_features: 0.5
  max_depth: 4
  criterion: gini
