# Configuration for breast_cancer_wisconsin dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset breast_cancer_wisconsin --method dpg
#   python scripts/run_experiment.py --dataset breast_cancer_wisconsin --method dice

data:
  dataset: breast_cancer_wisconsin
  dataset_url: https://huggingface.co/datasets/MLLab-TS/breast_cancer_wisconsin/resolve/main/dataset.csv
  target_column: diagnosis
experiment:
  tags:
  - breast_cancer_wisconsin
  name: breast_cancer_wisconsin
model:
  n_estimators: 20
  min_impurity_decrease: 0.0
  max_features: 0.3
  max_depth: 3
