# Configuration for heart_disease_uci dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset heart_disease_uci --method dpg
#   python scripts/run_experiment.py --dataset heart_disease_uci --method dice

data:
  dataset: heart_disease_uci
  dataset_url: https://huggingface.co/datasets/MLLab-TS/heart_disease_uci/resolve/main/dataset.csv
  target_column: num
  categorical_features:
  - sex
  - dataset
  - cp
  - restecg
  - slope
  - thal
experiment:
  tags:
  - heart_disease_uci
  name: heart_disease_uci
methods:
  _default:
    actionability:
      age: non_decreasing
      sex: no_change
      chol: non_increasing
      thalach: non_increasing
model:
  n_estimators: 12
  min_samples_split: 10
  min_impurity_decrease: 0.0
  max_features: 0.3
  max_depth: 6
  criterion: entropy
