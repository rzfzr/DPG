# Configuration for letter_img dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset letter_img --method dpg
#   python scripts/run_experiment.py --dataset letter_img --method dice

data:
  dataset: letter_img
  dataset_url: https://huggingface.co/datasets/MLLab-TS/letter_img/resolve/main/dataset.csv
  target_column: target
experiment:
  tags:
  - letter_img
  name: letter_img
model:
  n_estimators: 10
  min_impurity_decrease: 0.0
  max_features: 0.5
  max_depth: 5
