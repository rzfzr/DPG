# Configuration for coil_2000 dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset coil_2000 --method dpg
#   python scripts/run_experiment.py --dataset coil_2000 --method dice

data:
  dataset: coil_2000
  dataset_url: https://huggingface.co/datasets/MLLab-TS/coil_2000/resolve/main/dataset.csv
  target_column: target
experiment:
  tags:
  - coil_2000
  name: coil_2000
model:
  n_estimators: 7
  min_samples_split: 12
  min_impurity_decrease: 0.0
  max_features: 0.3
  max_depth: 6
  criterion: entropy
