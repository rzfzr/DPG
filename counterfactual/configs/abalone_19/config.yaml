# Configuration for abalone_19 dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset abalone_19 --method dpg
#   python scripts/run_experiment.py --dataset abalone_19 --method dice

data:
  dataset: abalone_19
  dataset_url: https://huggingface.co/datasets/MLLab-TS/abalone_19/resolve/main/dataset.csv
  target_column: target
experiment:
  tags:
  - abalone_19
  name: abalone_19
model:
  n_estimators: 3
  min_impurity_decrease: 0.0
  max_features: 0.3
  max_depth: 6
