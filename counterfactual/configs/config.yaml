  - arrhythmia
  - pen_digits
  - red_wine_quality

# Data defaults
data:
  test_size: 0.2
  random_state: 42

# Model defaults
model:
  type: RandomForestClassifier
  random_state: 42

experiment:
  project: CounterFactualDPG

experiment_params:
  seed: 42
  num_samples: 1
  requested_counterfactuals: 5
  compute_comprehensive_metrics: true

output:
  local_dir: outputs
  save_visualizations: true
  save_visualization_images: true
  save_visualizations_per_generation: false

# Tunable constants for counterfactual generation internals
constants:
  # Fitness calculation
  invalid_fitness: 1000000.0
  class_penalty_soft_base: 100.0
  class_penalty_hard_boost: 50.0
  boundary_penalty_threshold: 0.1
  boundary_penalty_value: 30.0
  constraint_violation_multiplier: 2.0

  # Sample generation
  mutation_epsilon: 0.01
  sample_gen_range_scale: 0.5
  sample_gen_escape_bias: 0.3
  actionability_range_adjust: 0.1

  # Probability and validation
  default_boundary_distance: 0.05

  # Fitness sharing
  fitness_sharing_base_sigma: 3.0

  # Unconstrained feature penalty
  unconstrained_change_penalty_factor: 10.0

  # Constraint scorer weights
  coverage_weight: 0.6
  separation_weight: 0.4

# Counterfactual method defaults
methods:
  _default:
    actionability: {}
    diversity_weight: 1.0
    repulsion_weight: 4.0
    boundary_weight: 15.0
    distance_factor: 100.0
    sparsity_factor: 1.0
    constraints_factor: 3.0
    original_escape_weight: 2.0
    escape_pressure: 0.5
    prioritize_non_overlapping: true
  dpg:
    overgeneration_factor: 10
    diversity_weight: 0.8
    diversity_lambda: 0.9
    # DPG configuration parameters (optional, defaults provided in DPG/config.yaml)
    config:
      perc_var: 0.0000001
      decimal_threshold: 3
      n_jobs: -1
      visualization:
        graph_attrs:
          bgcolor: "white"
          rankdir: "R"
        node_attrs:
          shape: "box"
          fillcolor: "#ffc3c3"
        class_node:
          fillcolor: "#a4c2f4"
          shape: "box"
          style: "rounded, filled"
  dice:
    # total_CFs: 4
    # proximity_weight: 0.5
    # diversity_weight: 1.0
    generation_method: genetic
  dpg_dice:
    # DiCE + DPG hybrid: DPG target-class bounds feed DiCE's permitted_range.
    # Merge priority (lowest→highest): DPG bounds < actionability < config overrides.
    generation_method: genetic
    # proximity_weight: 0.5
    # diversity_weight: 1.0
    # maxiterations: 500
    # posthoc_sparsity_algorithm: linear
    config:
      perc_var: 0.0000001
      decimal_threshold: 3
      n_jobs: -1
