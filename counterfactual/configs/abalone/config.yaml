# Configuration for abalone dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset abalone --method dpg
#   python scripts/run_experiment.py --dataset abalone --method dice

data:
  dataset: abalone
  dataset_url: https://huggingface.co/datasets/MLLab-TS/abalone/resolve/main/dataset.csv
  target_column: target
experiment:
  tags:
  - abalone
  name: abalone
model:
  n_estimators: 2
  min_impurity_decrease: 0.0
  max_features: 0.5
  max_depth: 5
