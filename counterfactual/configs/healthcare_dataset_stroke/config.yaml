# Configuration for healthcare_dataset_stroke dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset healthcare_dataset_stroke --method dpg
#   python scripts/run_experiment.py --dataset healthcare_dataset_stroke --method dice

data:
  dataset: healthcare_dataset_stroke
  dataset_url: https://huggingface.co/datasets/MLLab-TS/healthcare_dataset_stroke/resolve/main/dataset.csv
  target_column: stroke
  categorical_features:
  - gender
  - hypertension
  - heart_disease
  - ever_married
  - work_type
  - Residence_type
  - smoking_status
experiment:
  tags:
  - healthcare_dataset_stroke
  name: healthcare_dataset_stroke
methods:
  _default:
    actionability:
      age: non_decreasing
      gender: no_change
      hypertension: no_change
      heart_disease: no_change
      ever_married: no_change
      work_type: actionable
      Residence_type: actionable
      avg_glucose_level: actionable
      bmi: actionable
      smoking_status: actionable
model:
  n_estimators: 4
  min_impurity_decrease: 0.0
  max_features: 0.3
  max_depth: 3
