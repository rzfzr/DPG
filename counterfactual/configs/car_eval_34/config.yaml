# Configuration for car_eval_34 dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset car_eval_34 --method dpg
#   python scripts/run_experiment.py --dataset car_eval_34 --method dice

data:
  dataset: car_eval_34
  dataset_url: https://huggingface.co/datasets/MLLab-TS/car_eval_34/resolve/main/dataset.csv
  target_column: target
experiment:
  tags:
  - car_eval_34
  name: car_eval_34
model:
  n_estimators: 4
  min_impurity_decrease: 0.0
  max_features: null
  max_depth: 10
