# Configuration for wheat-seeds dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset wheat-seeds --method dpg
#   python scripts/run_experiment.py --dataset wheat-seeds --method dice

data:
  dataset: wheat-seeds
  dataset_url: https://huggingface.co/datasets/MLLab-TS/wheat-seeds/resolve/main/dataset.csv
  target_column: Type
experiment:
  tags:
  - wheat-seeds
  name: wheat-seeds
model:
  n_estimators: 2
  min_impurity_decrease: 0.08
  max_features: 0.3
  max_depth: 7
