# Configuration for oil dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset oil --method dpg
#   python scripts/run_experiment.py --dataset oil --method dice

data:
  dataset: oil
  dataset_url: https://huggingface.co/datasets/MLLab-TS/oil/resolve/main/dataset.csv
  target_column: target
experiment:
  tags:
  - oil
  name: oil
experiment_params:
  sample_indices:
  - 4
model:
  n_estimators: 10
  min_impurity_decrease: 0.0
  max_features: 0.3
  max_depth: 7
