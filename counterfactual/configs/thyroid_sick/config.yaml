# Configuration for thyroid_sick dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset thyroid_sick --method dpg
#   python scripts/run_experiment.py --dataset thyroid_sick --method dice

data:
  dataset: thyroid_sick
  dataset_url: https://huggingface.co/datasets/MLLab-TS/thyroid_sick/resolve/main/dataset.csv
  target_column: target
experiment:
  tags:
  - thyroid_sick
  name: thyroid_sick
methods:
  _default:
    actionability:
      0: non_decreasing
model:
  n_estimators: 20
  min_samples_split: 5
  min_impurity_decrease: 0.0
  max_features: 0.7
  max_depth: 10
  criterion: gini
