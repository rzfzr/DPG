# Configuration for diabetes dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset diabetes --method dpg
#   python scripts/run_experiment.py --dataset diabetes --method dice

data:
  dataset: diabetes
  dataset_url: https://huggingface.co/datasets/MLLab-TS/diabetes/resolve/main/dataset.csv
  target_column: Outcome
experiment:
  tags:
  - diabetes
  name: diabetes
methods:
  _default:
    actionability:
      Age: non_decreasing
      Pregnancies: non_decreasing
      DiabetesPedigreeFunction: no_change
      BMI: actionable
      Glucose: actionable
      BloodPressure: actionable
  dpg:
    verbose: false
model:
  n_estimators: 12
  min_impurity_decrease: 0.01
  max_features: null
  max_depth: 5
experiment_params:
  sample_indices:
  - 2
