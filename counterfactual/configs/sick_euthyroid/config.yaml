# Configuration for sick_euthyroid dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset sick_euthyroid --method dpg
#   python scripts/run_experiment.py --dataset sick_euthyroid --method dice

data:
  dataset: sick_euthyroid
  dataset_url: https://huggingface.co/datasets/MLLab-TS/sick_euthyroid/resolve/main/dataset.csv
  target_column: target
experiment:
  tags:
  - sick_euthyroid
  name: sick_euthyroid
methods:
  _default:
    actionability:
      0: non_decreasing
model:
  n_estimators: 20
  min_samples_split: 3
  min_impurity_decrease: 0.0
  max_features: 0.7
  max_depth: 10
  criterion: entropy
