# Configuration for isolet dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset isolet --method dpg
#   python scripts/run_experiment.py --dataset isolet --method dice

data:
  dataset: isolet
  dataset_url: https://huggingface.co/datasets/MLLab-TS/isolet/resolve/main/dataset.csv
  target_column: target
experiment:
  tags:
  - isolet
  name: isolet
model:
  n_estimators: 7
  max_depth: 10
  min_impurity_decrease: 0.0
  max_features: 0.3
