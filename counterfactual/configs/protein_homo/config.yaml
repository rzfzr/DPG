# Configuration for protein_homo dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset protein_homo --method dpg
#   python scripts/run_experiment.py --dataset protein_homo --method dice

data:
  dataset: protein_homo
  dataset_url: https://huggingface.co/datasets/MLLab-TS/protein_homo/resolve/main/dataset.csv
  target_column: target
experiment:
  tags:
  - protein_homo
  name: protein_homo
model:
  n_estimators: 10
  min_samples_split: 2
  min_impurity_decrease: 0.0
  max_features: 0.3
  max_depth: 10
  criterion: entropy
