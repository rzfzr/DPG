# Configuration for quality_control_dataset dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset quality_control_dataset --method dpg
#   python scripts/run_experiment.py --dataset quality_control_dataset --method dice

data:
  dataset: quality_control_dataset
  dataset_url: https://huggingface.co/datasets/MLLab-TS/quality_control_dataset/resolve/main/dataset.csv
  target_column: Defective
experiment:
  tags:
  - quality_control_dataset
  name: quality_control_dataset
model:
  n_estimators: 7
  min_samples_split: 10
  min_impurity_decrease: 0.01
  max_features: 0.7
  max_depth: 3
  criterion: gini
