# Configuration for ecoli dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset ecoli --method dpg
#   python scripts/run_experiment.py --dataset ecoli --method dice

data:
  dataset: ecoli
  dataset_url: https://huggingface.co/datasets/MLLab-TS/ecoli/resolve/main/dataset.csv
  target_column: target
experiment:
  tags:
  - ecoli
  name: ecoli
model:
  n_estimators: 7
  min_samples_split: 12
  min_impurity_decrease: 0.0
  max_features: 0.5
  max_depth: 4
  criterion: gini
