# Configuration for spectrometer dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset spectrometer --method dpg
#   python scripts/run_experiment.py --dataset spectrometer --method dice

data:
  dataset: spectrometer
  dataset_url: https://huggingface.co/datasets/MLLab-TS/spectrometer/resolve/main/dataset.csv
  target_column: target
experiment:
  tags:
  - spectrometer
  name: spectrometer
model:
  n_estimators: 20
  min_samples_split: 5
  min_impurity_decrease: 0.0
  max_features: 0.3
  max_depth: 7
  criterion: entropy
