# Configuration for satimage dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset satimage --method dpg
#   python scripts/run_experiment.py --dataset satimage --method dice

data:
  dataset: satimage
  dataset_url: https://huggingface.co/datasets/MLLab-TS/satimage/resolve/main/dataset.csv
  target_column: target
experiment:
  tags:
  - satimage
  name: satimage
model:
  n_estimators: 20
  min_impurity_decrease: 0.0
  max_features: 0.3
  max_depth: 10
