# Configuration for mammography dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset mammography --method dpg
#   python scripts/run_experiment.py --dataset mammography --method dice

data:
  dataset: mammography
  dataset_url: https://huggingface.co/datasets/MLLab-TS/mammography/resolve/main/dataset.csv
  target_column: target
experiment:
  tags:
  - mammography
  name: mammography
model:
  n_estimators: 12
  min_impurity_decrease: 0.0
  max_features: 0.5
  max_depth: 10
