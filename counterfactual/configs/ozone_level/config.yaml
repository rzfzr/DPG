# Configuration for ozone_level dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset ozone_level --method dpg
#   python scripts/run_experiment.py --dataset ozone_level --method dice

data:
  dataset: ozone_level
  dataset_url: https://huggingface.co/datasets/MLLab-TS/ozone_level/resolve/main/dataset.csv
  target_column: target
experiment:
  tags:
  - ozone_level
  name: ozone_level
model:
  n_estimators: 7
  min_impurity_decrease: 0.0
  max_features: null
  max_depth: 7
