# Configuration for car_eval_4 dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset car_eval_4 --method dpg
#   python scripts/run_experiment.py --dataset car_eval_4 --method dice

data:
  dataset: car_eval_4
  dataset_url: https://huggingface.co/datasets/MLLab-TS/car_eval_4/resolve/main/dataset.csv
  target_column: target
experiment:
  tags:
  - car_eval_4
  name: car_eval_4
model:
  n_estimators: 10
  min_impurity_decrease: 0.0
  max_features: 0.3
  max_depth: 10
