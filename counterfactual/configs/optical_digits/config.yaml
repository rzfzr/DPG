# Configuration for optical_digits dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset optical_digits --method dpg
#   python scripts/run_experiment.py --dataset optical_digits --method dice

data:
  dataset: optical_digits
  dataset_url: https://huggingface.co/datasets/MLLab-TS/optical_digits/resolve/main/dataset.csv
  target_column: target
experiment:
  tags:
  - optical_digits
  name: optical_digits
model:
  max_depth: 10
  max_features: 0.3
  min_impurity_decrease: 0.0
  n_estimators: 20
