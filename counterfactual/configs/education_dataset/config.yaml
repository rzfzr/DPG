# Configuration for education_dataset dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset education_dataset --method dpg
#   python scripts/run_experiment.py --dataset education_dataset --method dice

data:
  dataset: education_dataset
  dataset_url: https://huggingface.co/datasets/MLLab-TS/education_dataset/resolve/main/dataset.csv
  target_column: PassFail
experiment:
  tags:
  - education_dataset
  name: education_dataset
model:
  n_estimators: 15
  min_samples_split: 4
  min_impurity_decrease: 0.01
  max_features: 0.3
  max_depth: 3
  criterion: entropy
