# Configuration for customer_personality_analysis dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset customer_personality_analysis --method dpg
#   python scripts/run_experiment.py --dataset customer_personality_analysis --method dice

data:
  dataset: customer_personality_analysis
  dataset_url: https://huggingface.co/datasets/MLLab-TS/customer_personality_analysis/resolve/main/dataset.csv
  target_column: Response
  separator: "\t"
  categorical_features:
  - Education
  - Marital_Status
experiment:
  tags:
  - customer_personality_analysis
  name: customer_personality_analysis
methods:
  _default:
    actionability:
      ID: no_change
      Year_Birth: no_change
      Education: actionable
      Marital_Status: actionable
      Income: actionable
      Kidhome: non_decreasing
      Teenhome: non_decreasing
      Dt_Customer: no_change
      Recency: non_decreasing
      MntWines: actionable
      MntFruits: actionable
      MntMeatProducts: actionable
      MntFishProducts: actionable
      MntSweetProducts: actionable
      MntGoldProds: actionable
      NumDealsPurchases: actionable
      NumWebPurchases: actionable
      NumCatalogPurchases: actionable
      NumStorePurchases: actionable
      NumWebVisitsMonth: actionable
      AcceptedCmp3: no_change
      AcceptedCmp4: no_change
      AcceptedCmp5: no_change
      AcceptedCmp1: no_change
      AcceptedCmp2: no_change
      Complain: no_change
      Z_CostContact: no_change
      Z_Revenue: no_change
      Response: no_change
  dpg:
    overgeneration_factor: 2
    verbose: true
model:
  n_estimators: 20
  min_impurity_decrease: 0.0
  max_features: 0.5
  max_depth: 10
