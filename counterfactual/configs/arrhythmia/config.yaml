# Configuration for arrhythmia dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset arrhythmia --method dpg
#   python scripts/run_experiment.py --dataset arrhythmia --method dice

data:
  dataset: arrhythmia
  dataset_url: https://huggingface.co/datasets/MLLab-TS/arrhythmia/resolve/main/dataset.csv
  target_column: target
experiment:
  tags:
  - arrhythmia
  name: arrhythmia
model:
  n_estimators: 20
  min_impurity_decrease: 0.0
  max_features: 0.3
  max_depth: 8
