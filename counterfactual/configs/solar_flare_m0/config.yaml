# Configuration for solar_flare_m0 dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset solar_flare_m0 --method dpg
#   python scripts/run_experiment.py --dataset solar_flare_m0 --method dice

data:
  dataset: solar_flare_m0
  dataset_url: https://huggingface.co/datasets/MLLab-TS/solar_flare_m0/resolve/main/dataset.csv
  target_column: target
experiment:
  tags:
  - solar_flare_m0
  name: solar_flare_m0
model:
  n_estimators: 5
  min_samples_split: 7
  min_impurity_decrease: 0.1
  max_features: 0.3
  max_depth: 3
  criterion: entropy
