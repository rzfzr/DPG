# Configuration for yeast_ml8 dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset yeast_ml8 --method dpg
#   python scripts/run_experiment.py --dataset yeast_ml8 --method dice

data:
  dataset: yeast_ml8
  dataset_url: https://huggingface.co/datasets/MLLab-TS/yeast_ml8/resolve/main/dataset.csv
  target_column: target
experiment:
  tags:
  - yeast_ml8
  name: yeast_ml8
model:
  n_estimators: 4
  min_samples_split: 10
  min_impurity_decrease: 0.0
  max_features: 0.7
  max_depth: 3
  criterion: entropy
