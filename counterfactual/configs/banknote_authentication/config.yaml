# Configuration for banknote_authentication dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset banknote_authentication --method dpg
#   python scripts/run_experiment.py --dataset banknote_authentication --method dice

data:
  dataset: banknote_authentication
  dataset_url: https://huggingface.co/datasets/MLLab-TS/banknote_authentication/resolve/main/dataset.csv
  target_column: class
experiment:
  tags:
  - banknote_authentication
  name: banknote_authentication
model:
  n_estimators: 3
  min_impurity_decrease: 0.01
  max_features: 0.3
  max_depth: 4
