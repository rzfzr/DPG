# Configuration for obesity_levels dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset obesity_levels --method dpg
#   python scripts/run_experiment.py --dataset obesity_levels --method dice

data:
  dataset: obesity_levels
  dataset_url: https://huggingface.co/datasets/MLLab-TS/obesity_levels/resolve/main/dataset.csv
  target_column: NObeyesdad
  categorical_features:
  - Gender
  - CALC
  - FAVC
  - SCC
  - SMOKE
  - family_history_with_overweight
  - CAEC
  - MTRANS
experiment:
  tags:
  - obesity_levels
  name: obesity_levels
methods:
  dpg:
    overgeneration_factor: 20
  _default:
    actionability:
      Age: non_decreasing
      Gender: no_change
      Height: no_change
      family_history_with_overweight: no_change
model:
  n_estimators: 7
  min_impurity_decrease: 0.0
  max_features: null
  max_depth: 6
