# Configuration for energy_dataset dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset energy_dataset --method dpg
#   python scripts/run_experiment.py --dataset energy_dataset --method dice

data:
  dataset: energy_dataset
  dataset_url: https://huggingface.co/datasets/MLLab-TS/energy_dataset/resolve/main/dataset.csv
  target_column: Anomalous
experiment:
  tags:
  - energy_dataset
  name: energy_dataset
model:
  n_estimators: 20
  min_impurity_decrease: 0.05
  max_features: 0.3
  max_depth: 7
