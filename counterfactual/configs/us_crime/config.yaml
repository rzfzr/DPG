# Configuration for us_crime dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset us_crime --method dpg
#   python scripts/run_experiment.py --dataset us_crime --method dice

data:
  dataset: us_crime
  dataset_url: https://huggingface.co/datasets/MLLab-TS/us_crime/resolve/main/dataset.csv
  target_column: target
experiment:
  tags:
  - us_crime
  name: us_crime
model:
  n_estimators: 10
  min_samples_split: 15
  min_impurity_decrease: 0.0
  max_features: 0.3
  max_depth: 8
  criterion: entropy
