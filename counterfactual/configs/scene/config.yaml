# Configuration for scene dataset
# Only dataset-specific overrides are included here.
# Base defaults are loaded from configs/config.yaml
#
# Usage:
#   python scripts/run_experiment.py --dataset scene --method dpg
#   python scripts/run_experiment.py --dataset scene --method dice

data:
  dataset: scene
  dataset_url: https://huggingface.co/datasets/MLLab-TS/scene/resolve/main/dataset.csv
  target_column: target
experiment:
  tags:
  - scene
  name: scene
model:
  n_estimators: 10
  min_samples_split: 12
  min_impurity_decrease: 0.0
  max_features: 0.3
  max_depth: 6
  criterion: entropy
